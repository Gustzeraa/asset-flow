{% extends 'base.html' %}

{% block conteudo %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body text-center p-5">
                <h3 class="text-danger mb-4">⚠️ Confirmar Exclusão</h3>
                
                <p class="fs-5 mb-1">Tem certeza que deseja excluir este registro?</p>
                <p class="fw-bold fs-4 text-dark">{{ item.nome }}</p>
                <p class="text-muted small mb-4">Atenção: Esta ação apagará o item permanentemente do banco de dados.</p>

                <form method="POST">
                    {% csrf_token %}
                    <a href="javascript:history.back()" class="btn btn-secondary me-2 px-4">Cancelar</a>
                    <button type="submit" class="btn btn-danger px-4">Sim, Excluir</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
