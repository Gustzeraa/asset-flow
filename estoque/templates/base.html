<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Patrimônio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f8f9fa;
            overflow-x: hidden; /* Evita barra de rolagem horizontal */
        }
        
        #wrapper {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Estilos da Sidebar */
        #sidebar {
            min-width: 250px;
            max-width: 250px;
            background-color: #183e65; /* Dark theme */
            color: white;
            transition: all 0.3s ease; /* Animação suave */
            display: flex;
            flex-direction: column;
        }

        /* Classe que o JavaScript vai adicionar para encolher o menu */
        #sidebar.collapsed {
            min-width: 70px;
            max-width: 70px;
        }

        /* Esconde os textos quando estiver encolhido */
        #sidebar.collapsed .nav-text, 
        #sidebar.collapsed .brand-text {
            display: none;
        }

        /* Centraliza os ícones quando encolhido */
        #sidebar.collapsed .nav-link {
            text-align: center;
            padding: 0.8rem 0;
        }

        .nav-link {
            color: rgba(255,255,255,.75);
            padding: 0.8rem 1.5rem;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .nav-link:hover {
            color: white;
            background-color: #183e65(255,255,255,.1);
            border-radius: 4px;
        }

        /* Área de conteúdo principal */
        #content-area {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        /* Barra superior fininha só para o botão de toggle */
        .topbar {
            background-color: white;
            box-shadow: 0 2px 4px rgba(0,0,0,.08);
            padding: 0.5rem 1rem;
        }

        #toggle-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #183e65;
        }
    </style>
</head>
<body>

    <div id="wrapper">
        <nav id="sidebar" class="shadow">
            <div class="p-4 border-bottom border-secondary text-center">
                <a href="{% url 'dashboard' %}" class="text-white text-decoration-none fs-5 fw-bold brand-text">
                    Sistema ICTQ
                </a>
                <a href="{% url 'dashboard' %}" class="text-white text-decoration-none fs-5 fw-bold d-none" id="brand-icon">
                    🚀
                </a>
            </div>

            <ul class="nav flex-column mt-3 px-2">
                <li class="nav-item mb-1">
                    <a href="{% url 'dashboard' %}" class="nav-link">
                        🏠 <span class="nav-text ms-2">Início</span>
                    </a>
                </li>
                <li class="nav-item mb-1">
                    <a href="{% url 'lista_equipamentos' %}" class="nav-link">
                        📦 <span class="nav-text ms-2">Inventário</span>
                    </a>
                </li>
                <li class="nav-item mb-1">
                    <a href="{% url 'lista_consumiveis' %}" class="nav-link">
                        ☕ <span class="nav-text ms-2">Consumíveis</span>
                    </a>
                </li>
                <li class="nav-item mb-1">
                    <a href="{% url 'lista_colaboradores' %}" class="nav-link">
                        👥 <span class="nav-text ms-2">Colaboradores</span>
                    </a>
                </li>
                <li class="nav-item mb-1">
                    <a href="{% url 'lista_categorias' %}" class="nav-link">
                        🏷️ <span class="nav-text ms-2">Categorias</span>
                    </a>
                </li>
            </ul>
            <div class="border-top border-secondary p-3 mt-auto">
                <form action="{% url 'logout' %}" method="post" class="m-0 p-0">
                    {% csrf_token %}
                    <button type="submit" class="nav-link w-100 text-start bg-transparent border-0 text-danger fw-bold d-flex align-items-center">
                        🚪 <span class="nav-text ms-2">Sair do Sistema</span>
                    </button>
                </form>
            </div>
        </nav>

        <div id="content-area">
            
            <div class="topbar d-flex align-items-center">
                <button id="toggle-btn" title="Minimizar/Expandir Menu">☰</button>
                <span class="ms-3 text-muted fw-bold brand-text-top d-none">Controle de Patrimônio</span>
            </div>

            <div class="container-fluid p-4">
                {% block conteudo %}
                {% endblock %}
            </div>
            
        </div>
    </div>

    <script>
        document.getElementById('toggle-btn').addEventListener('click', function () {
            const sidebar = document.getElementById('sidebar');
            const brandIcon = document.getElementById('brand-icon');
            const topText = document.querySelector('.brand-text-top');
            
            // Alterna a classe 'collapsed' na sidebar
            sidebar.classList.toggle('collapsed');
            
            // Mostra/esconde o mini ícone do foguete e o texto lá em cima
            if (sidebar.classList.contains('collapsed')) {
                brandIcon.classList.remove('d-none');
                topText.classList.remove('d-none');
            } else {
                brandIcon.classList.add('d-none');
                topText.classList.add('d-none');
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
